<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Sequence simplifiee</title>
  <desc id="desc">Trois colonnes representant l'utilisateur, l'application et le moteur PDF.</desc>
  <rect width="920" height="300" fill="#ffffff" />
  <g font-family="Segoe UI, Arial, sans-serif" fill="#0f172a">
    <text x="160" y="42" font-size="24" text-anchor="middle">Utilisateur</text>
    <text x="460" y="42" font-size="24" text-anchor="middle">Application</text>
    <text x="760" y="42" font-size="24" text-anchor="middle">Moteur PDF</text>
  </g>
  <g stroke="#94a3b8" stroke-width="3" stroke-dasharray="10 10">
    <line x1="160" y1="60" x2="160" y2="260" />
    <line x1="460" y1="60" x2="460" y2="260" />
    <line x1="760" y1="60" x2="760" y2="260" />
  </g>
  <g stroke="#2563eb" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M180 100 H440" />
    <path d="M420 88 L440 100 L420 112" />
    <path d="M480 150 H740" />
    <path d="M720 138 L740 150 L720 162" />
    <path d="M740 210 H480" />
    <path d="M500 198 L480 210 L500 222" />
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">
    <text x="310" y="88" text-anchor="middle">Choix du fichier Markdown</text>
    <text x="610" y="138" text-anchor="middle">Generation du PDF</text>
    <text x="610" y="198" text-anchor="middle">Retour du document final</text>
  </g>
</svg>
