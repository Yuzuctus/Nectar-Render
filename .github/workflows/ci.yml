name: CI

on:
  push:
    branches: [main, UI-update]
  pull_request:
    branches: [main, UI-update]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.lock
          pip install -r backend/requirements.txt
          pip install -e . --no-deps

      - name: Run tests
        run: pytest -q -m "not requires_weasyprint"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.lock
          pip install -r backend/requirements.txt
          pip install -e . --no-deps

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

  weasyprint-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install locked dependencies
        run: |
          pip install -r requirements-dev.lock
          pip install -r backend/requirements.txt
          pip install -e . --no-deps

      - name: Install MSYS2 and Pango
        shell: pwsh
        run: |
          winget install --id MSYS2.MSYS2 --accept-package-agreements --accept-source-agreements --silent
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-pango"

      - name: Run WeasyPrint smoke test
        shell: pwsh
        run: |
          python -c "from pathlib import Path; from tempfile import TemporaryDirectory; from nectar_render.utils.weasyprint_runtime import prepare_weasyprint_environment; prepare_weasyprint_environment(); from weasyprint import HTML; tmp = TemporaryDirectory(); out = Path(tmp.name) / 'smoke.pdf'; HTML(string='<h1>Nectar Render</h1>').write_pdf(out); assert out.exists() and out.stat().st_size > 0"
